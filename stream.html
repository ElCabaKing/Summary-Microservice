<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resumen por Streaming</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      padding: 2rem;
      min-height: 100vh;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: .5rem;
    }

    p {
      color: #666;
      margin-bottom: 1.5rem;
      font-size: .9rem;
    }

    .section {
      margin-top: 1rem;
      background: #fff;
      padding: 1rem;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .1);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .section-header h3 {
      font-size: 1rem;
      font-weight: 600;
      color: #333;
    }

    .section-body {
      margin-top: 1rem;
    }

    .section-body.hidden {
      display: none;
    }

    .drop-zone {
      border: 2px dashed #ccc;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      text-align: center;
      transition: all .2s;
      cursor: pointer;
      background: #fff;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .drop-zone.has-file {
      border-color: #16a34a;
      border-style: solid;
      background: #f0fdf4;
    }

    .drop-zone input {
      display: none;
    }

    .drop-zone .icon {
      font-size: 2rem;
      margin-bottom: .5rem;
    }

    .drop-zone .file-name {
      font-weight: 600;
    }

    button {
      display: block;
      width: 100%;
      margin-top: 1rem;
      padding: .75rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }

    button:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: #1d4ed8;
    }

    .btn-danger {
      background: #dc2626;
      color: #fff;
    }

    .btn-danger:hover:not(:disabled) {
      background: #b91c1c;
    }

    .btn-success {
      background: #16a34a;
      color: #fff;
    }

    .btn-success:hover:not(:disabled) {
      background: #15803d;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #d1d5db;
      color: #374151;
    }

    .btn-outline:hover:not(:disabled) {
      background: #f3f4f6;
    }

    .btn-sm {
      display: inline-block;
      width: auto;
      padding: .4rem .75rem;
      font-size: .8rem;
      margin-top: 0;
    }

    .actions {
      display: flex;
      gap: .5rem;
    }

    .actions button {
      flex: 1;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-size: .875rem;
      font-weight: 600;
      margin-bottom: .25rem;
      color: #333;
    }

    .form-group select,
    .form-group input,
    .form-group textarea {
      padding: .5rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: .9rem;
      background: #fff;
      transition: border-color .2s;
    }

    .form-group select:focus,
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .form-group textarea {
      min-height: 80px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: .8rem;
      resize: vertical;
    }

    .form-group input[type="range"] {
      padding: 0;
      border: none;
      margin-top: .25rem;
    }

    .form-group input[type="number"] {
      width: 100%;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .25rem .6rem;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
    }

    .badge-tenant {
      background: #dbeafe;
      color: #1e40af;
    }

    .badge-role {
      background: #fef3c7;
      color: #92400e;
    }

    .badge-inactive {
      background: #fee2e2;
      color: #991b1b;
    }

    .badge-active {
      background: #dcfce7;
      color: #166534;
    }

    .badge-group {
      display: flex;
      gap: .5rem;
      align-items: center;
      margin-top: .5rem;
    }

    .progress-bar {
      margin-top: 1rem;
      height: 4px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
      display: none;
    }

    .progress-bar.active {
      display: block;
    }

    .progress-bar .fill {
      height: 100%;
      width: 0%;
      background: #2563eb;
      transition: width .3s;
    }

    .status {
      margin-top: .75rem;
      font-size: .875rem;
      color: #666;
    }

    .log {
      margin-top: 1rem;
      background: #1a1a2e;
      color: #e0e0e0;
      border-radius: 8px;
      padding: 1rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: .8rem;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
    }

    .log.active {
      display: block;
    }

    .log .event {
      margin-bottom: .25rem;
    }

    .log .event.status {
      color: #fbbf24;
    }

    .log .event.chunk {
      color: #a78bfa;
    }

    .log .event.completed {
      color: #34d399;
    }

    .log .event.error {
      color: #f87171;
    }

    .log .event.info {
      color: #60a5fa;
    }

    #summary-output {
      margin-top: 1rem;
      background: #fff;
      border-radius: 8px;
      padding: 1.25rem;
      line-height: 1.6;
      display: none;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .1);
    }

    #summary-output.visible {
      display: block;
    }

    #summary-output h2 {
      font-size: 1rem;
      margin-bottom: .5rem;
      color: #333;
    }

    #summary-output .content {
      font-size: .9rem;
      color: #444;
    }

    .result-msg {
      margin-top: .75rem;
      padding: .5rem .75rem;
      border-radius: 6px;
      font-size: .85rem;
      display: none;
    }

    .result-msg.success {
      display: block;
      background: #dcfce7;
      color: #166534;
    }

    .result-msg.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }

    .admin-warning {
      text-align: center;
      color: #92400e;
      font-size: .85rem;
      padding: .5rem;
      background: #fef3c7;
      border-radius: 6px;
    }

    .tenant-info-bar {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .5rem .75rem;
      background: #f0f9ff;
      border-radius: 6px;
      margin-bottom: .75rem;
      font-size: .85rem;
      color: #1e40af;
      flex-wrap: wrap;
    }

    .tenant-info-bar .label {
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Resumen por Streaming</h1>
    <p>Subí un PDF o TXT y recibí el resumen en tiempo real via SSE.</p>

    <!-- API Key Section -->
    <div class="section">
      <div class="section-header">
        <h3>🔑 API Key</h3>
        <div>
          <button class="btn-sm btn-outline" id="btnClearApiKey" style="display:none">🗑 Limpiar</button>
        </div>
      </div>
      <div class="form-group">
        <input type="text" id="apiKeyInput" placeholder="sk_live_...">
      </div>
      <div style="display:flex;gap:.5rem;margin-top:.5rem">
        <button class="btn-primary btn-sm" id="btnSaveApiKey" style="width:auto">Guardar API Key</button>
        <button class="btn-success btn-sm" id="btnGenerateApiKey" style="width:auto;display:none">+ Generar API Key</button>
      </div>
      <div class="badge-group" id="keyBadges" style="display:none">
        <span class="badge badge-tenant" id="tenantBadge">Tenant: —</span>
        <span class="badge badge-role" id="roleBadge">Role: —</span>
      </div>
    </div>

    <!-- Admin Generate API Key Section (hidden by default) -->
    <div class="section" id="genKeySection" style="display:none">
      <div class="section-header">
        <h3>🔐 Generar API Key para tenant</h3>
      </div>
      <div class="section-body" id="genKeyBody">
        <div class="form-group" style="margin-bottom:.75rem">
          <label for="genTenantId">Tenant ID</label>
          <input type="text" id="genTenantId" placeholder="tenant-alpha">
        </div>
        <div class="form-group">
          <label for="genRole">Rol</label>
          <select id="genRole">
            <option value="user">user</option>
            <option value="admin">admin</option>
          </select>
        </div>
        <button class="btn-success" id="btnCreateApiKey" style="margin-top:.75rem">Generar</button>
        <div class="result-msg" id="genKeyResult"></div>
      </div>
    </div>

    <!-- Admin Provider Section -->
    <div class="section" id="adminSection" style="display:none">
      <div class="section-header" id="adminToggle">
        <h3>⚙️ Configurar Provider (admin)</h3>
        <span id="adminArrow">▶</span>
      </div>
      <div class="section-body hidden" id="adminBody">
        <div class="form-group" style="margin-bottom:.75rem">
          <label for="adminTenantId">Tenant ID</label>
          <input type="text" id="adminTenantId" placeholder="tenant-alpha">
        </div>
        <div class="form-group">
          <label for="adminProvider">Provider</label>
          <select id="adminProvider">
            <option value="groq">Groq</option>
            <option value="gemini">Gemini</option>
          </select>
        </div>
        <div class="form-group" style="margin-top:.75rem">
          <label for="adminApiKey">API Key del provider</label>
          <input type="password" id="adminApiKey" placeholder="gsk_...">
        </div>
        <button class="btn-success" id="btnSaveConfig">Guardar Configuración</button>
        <div class="result-msg" id="adminResult"></div>
      </div>
    </div>

    <!-- Summarizer Section -->
    <div class="section">
      <div class="tenant-info-bar" id="tenantInfoBar">
        <span class="label">Tenant activo:</span>
        <span id="activeTenantDisplay" style="font-weight:600">—</span>
      </div>

      <div class="drop-zone" id="dropZone">
        <div class="icon">&#128196;</div>
        <div>Arrastrá un archivo o hacé clic para seleccionar</div>
        <div class="file-name" id="fileName"></div>
        <input type="file" id="fileInput" accept=".pdf,.txt,application/pdf,text/plain">
      </div>

      <div class="form-row" style="margin-top:1rem">
        <div class="form-group">
          <label for="providerSelect">Provider:</label>
          <select id="providerSelect">
            <option value="groq">Groq</option>
            <option value="gemini">Gemini</option>
          </select>
        </div>
        <div class="form-group">
          <label for="modelSelect">Modelo:</label>
          <select id="modelSelect">
            <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
          </select>
        </div>
      </div>

      <div class="form-row" style="margin-top:.75rem">
        <div class="form-group">
          <label for="temperatureRange">Temperatura: <span id="temperatureValue">0.2</span></label>
          <input type="range" id="temperatureRange" min="0" max="2" step="0.1" value="0.2">
        </div>
        <div class="form-group">
          <label for="maxTokensInput">Max Tokens:</label>
          <input type="number" id="maxTokensInput" min="64" max="8192" step="64" placeholder="2048">
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="btnSend" disabled>Enviar</button>
        <button class="btn-danger" id="btnCancel" disabled>Cancelar</button>
      </div>

      <div class="progress-bar" id="progressBar">
        <div class="fill" id="progressFill"></div>
      </div>
      <div class="status" id="status"></div>

      <div class="log" id="log"></div>

      <div id="summary-output">
        <h2>Resumen</h2>
        <div class="content" id="summaryContent"></div>
      </div>
    </div>
  </div>

  <script>
    const BASE_API_URL = 'http://localhost:5171/api/v1';
    const STREAM_API_URL = BASE_API_URL + '/summaries/stream';
    const ADMIN_API_URL = BASE_API_URL + '/admin/tenants';

    // Configuración de providers y modelos
    const PROVIDERS_CONFIG = {
      groq: {
        label: 'Groq',
        models: [
          { value: 'llama-3.3-70b-versatile', label: 'Llama 3.3 70B (Recomendado)' },
          { value: 'openai/gpt-oss-120b', label: 'GPT-OSS 120B' },
          { value: 'llama-3.1-8b-instant', label: 'Llama 3.1 8B Instant' }
        ]
      },
      gemini: {
        label: 'Gemini',
        models: [
          { value: 'gemini-2.5-flash', label: 'Gemini 2.5 Flash' },
          { value: 'gemini-2.5-pro', label: 'Gemini 2.5 Pro' },
          { value: 'gemini-3-flash-preview', label: 'Gemini 3 Flash (Preview)' },
          { value: 'gemini-1.5-flash-latest', label: 'Gemini 1.5 Flash' },
          { value: 'gemini-1.5-pro-latest', label: 'Gemini 1.5 Pro' }
        ]
      }
    };

    // DOM refs
    const apiKeyInput = document.getElementById('apiKeyInput');
    const btnSaveApiKey = document.getElementById('btnSaveApiKey');
    const btnClearApiKey = document.getElementById('btnClearApiKey');
    const btnGenerateApiKey = document.getElementById('btnGenerateApiKey');
    const keyBadges = document.getElementById('keyBadges');
    const tenantBadge = document.getElementById('tenantBadge');
    const roleBadge = document.getElementById('roleBadge');
    const activeTenantDisplay = document.getElementById('activeTenantDisplay');

    const genKeySection = document.getElementById('genKeySection');
    const genTenantId = document.getElementById('genTenantId');
    const genRole = document.getElementById('genRole');
    const btnCreateApiKey = document.getElementById('btnCreateApiKey');
    const genKeyResult = document.getElementById('genKeyResult');

    const adminSection = document.getElementById('adminSection');
    const adminToggle = document.getElementById('adminToggle');
    const adminArrow = document.getElementById('adminArrow');
    const adminBody = document.getElementById('adminBody');
    const adminTenantId = document.getElementById('adminTenantId');
    const adminProvider = document.getElementById('adminProvider');
    const adminApiKey = document.getElementById('adminApiKey');
    const btnSaveConfig = document.getElementById('btnSaveConfig');
    const adminResult = document.getElementById('adminResult');

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const btnSend = document.getElementById('btnSend');
    const btnCancel = document.getElementById('btnCancel');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const summaryOutput = document.getElementById('summary-output');
    const summaryContent = document.getElementById('summaryContent');
    const providerSelect = document.getElementById('providerSelect');
    const modelSelect = document.getElementById('modelSelect');
    const temperatureRange = document.getElementById('temperatureRange');
    const temperatureValue = document.getElementById('temperatureValue');
    const maxTokensInput = document.getElementById('maxTokensInput');

    let selectedFile = null;
    let abortController = null;
    let apiKeyToken = null;

    // ── API Key helpers ──

    function decodeApiKeyPrefix(prefix) {
      // The key format is sk_live_<64hex> 
      // We can't decode claims from the key itself (it's opaque/hashed)
      // Claims come from the server response on auth
      return null;
    }

    // ── UI updates ──

    function updateUI() {
      const token = localStorage.getItem('apiKey');
      apiKeyToken = token || null;
      apiKeyInput.value = token || '';

      if (!token) {
        keyBadges.style.display = 'none';
        btnClearApiKey.style.display = 'none';
        btnGenerateApiKey.style.display = 'none';
        genKeySection.style.display = 'none';
        adminSection.style.display = 'none';
        activeTenantDisplay.textContent = '—';
        btnSend.disabled = true;
        return;
      }

      // Try to decode prefix for display (just show first 16 chars)
      const preview = token.length > 16 ? token.substring(0, 16) + '...' : token;
      tenantBadge.textContent = `Key: ${preview}`;
      roleBadge.textContent = 'Role: ?';

      keyBadges.style.display = 'flex';
      btnClearApiKey.style.display = 'inline-block';
      btnGenerateApiKey.style.display = 'inline-block';
      activeTenantDisplay.textContent = 'Autenticado';
      btnSend.disabled = !selectedFile;
    }

    function saveApiKey() {
      const token = apiKeyInput.value.trim();
      if (!token) return;

      if (!token.startsWith('sk_live_')) {
        addLog('info', 'La API Key debería empezar con sk_live_');
      }

      localStorage.setItem('apiKey', token);
      addLog('info', 'API Key guardada');
      updateUI();
    }

    function clearApiKey() {
      localStorage.removeItem('apiKey');
      apiKeyToken = null;
      apiKeyInput.value = '';
      addLog('info', 'API Key eliminada');
      updateUI();
    }

    // ── Generate API Key ──

    btnCreateApiKey.addEventListener('click', async () => {
      const tenantId = genTenantId.value.trim();
      const role = genRole.value;

      if (!tenantId) {
        genKeyResult.className = 'result-msg error';
        genKeyResult.textContent = 'Completá el Tenant ID';
        genKeyResult.style.display = 'block';
        return;
      }

      btnCreateApiKey.disabled = true;
      btnCreateApiKey.textContent = 'Generando...';

      try {
        const res = await fetch(`${BASE_API_URL}/admin/apikeys`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKeyToken}`
          },
          body: JSON.stringify({ tenantId, role })
        });

        if (!res.ok) {
          const text = await res.text();
          throw new Error(`HTTP ${res.status}: ${text}`);
        }

        const data = await res.json();
        genKeyResult.className = 'result-msg success';
        genKeyResult.textContent = `✓ API Key generada: ${data.apiKey}`;
        genKeyResult.style.display = 'block';
        addLog('info', `API Key generada para tenant ${data.tenantId}, role ${data.role}`);
      } catch (err) {
        genKeyResult.className = 'result-msg error';
        genKeyResult.textContent = `Error: ${err.message}`;
        genKeyResult.style.display = 'block';
      } finally {
        btnCreateApiKey.disabled = false;
        btnCreateApiKey.textContent = 'Generar';
      }
    });

    // ── Admin ──

    btnSaveConfig.addEventListener('click', async () => {
      const tenantId = adminTenantId.value.trim();
      const provider = adminProvider.value;
      const apiKey = adminApiKey.value.trim();

      if (!tenantId || !apiKey) {
        adminResult.className = 'result-msg error';
        adminResult.textContent = 'Completá todos los campos';
        adminResult.style.display = 'block';
        return;
      }

      btnSaveConfig.disabled = true;
      btnSaveConfig.textContent = 'Guardando...';

      try {
        const res = await fetch(`${ADMIN_API_URL}/${encodeURIComponent(tenantId)}/providers`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKeyToken}`
          },
          body: JSON.stringify({ provider, apiKey })
        });

        if (!res.ok) {
          const text = await res.text();
          throw new Error(`HTTP ${res.status}: ${text}`);
        }

        adminResult.className = 'result-msg success';
        adminResult.textContent = `✓ Provider configurado exitosamente para tenant "${tenantId}"`;
        adminResult.style.display = 'block';
        adminApiKey.value = '';
        addLog('info', `Provider ${provider} configurado para tenant ${tenantId}`);
      } catch (err) {
        adminResult.className = 'result-msg error';
        adminResult.textContent = `Error: ${err.message}`;
        adminResult.style.display = 'block';
      } finally {
        btnSaveConfig.disabled = false;
        btnSaveConfig.textContent = 'Guardar Configuración';
      }
    });

    // ── Admin collapsible ──

    let adminExpanded = false;

    adminToggle.addEventListener('click', () => {
      adminExpanded = !adminExpanded;
      adminBody.classList.toggle('hidden', !adminExpanded);
      adminArrow.textContent = adminExpanded ? '▼' : '▶';
    });

    // ── Summarizer ──

    function updateModels() {
      const provider = providerSelect.value;
      const config = PROVIDERS_CONFIG[provider];
      modelSelect.innerHTML = '';
      config.models.forEach(model => {
        const option = document.createElement('option');
        option.value = model.value;
        option.textContent = model.label;
        modelSelect.appendChild(option);
      });
    }

    providerSelect.addEventListener('change', updateModels);

    temperatureRange.addEventListener('input', () => {
      temperatureValue.textContent = parseFloat(temperatureRange.value).toFixed(1);
    });

    function updateSendButton() {
      const hasFile = selectedFile !== null;
      dropZone.classList.toggle('has-file', hasFile);
      fileName.textContent = hasFile ? selectedFile.name : '';
      const hasKey = !!apiKeyToken;
      btnSend.disabled = !hasFile || !hasKey;
    }

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) setFile(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    function setFile(file) {
      selectedFile = file;
      updateSendButton();
    }

    function addLog(event, data) {
      logEl.classList.add('active');
      const line = document.createElement('div');
      line.className = `event ${event}`;
      line.textContent = `[${event}] ${typeof data === 'string' ? data : JSON.stringify(data)}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function setProgress(pct) {
      progressBar.classList.add('active');
      progressFill.style.width = pct + '%';
    }

    btnCancel.addEventListener('click', () => {
      if (abortController) {
        abortController.abort();
        abortController = null;
      }
      setStatus('Cancelado');
      btnCancel.disabled = true;
    });

    btnSend.addEventListener('click', async () => {
      if (!selectedFile || !apiKeyToken) return;

      summaryOutput.classList.remove('visible');
      summaryContent.textContent = '';
      logEl.classList.remove('active');
      logEl.innerHTML = '';
      progressFill.style.width = '0%';
      btnSend.disabled = true;
      btnCancel.disabled = false;

      const temperature = parseFloat(temperatureRange.value);
      const maxTokens = maxTokensInput.value
        ? parseInt(maxTokensInput.value, 10)
        : '';

      addLog('info', `Provider: ${providerSelect.options[providerSelect.selectedIndex].text}, Modelo: ${modelSelect.options[modelSelect.selectedIndex].text}${maxTokens ? `, MaxTokens: ${maxTokens}` : ''}`);

      abortController = new AbortController();

      const formData = new FormData();
      formData.append('document', selectedFile);
      formData.append('provider', providerSelect.value);
      formData.append('model', modelSelect.value);
      formData.append('temperature', temperature.toString());
      if (maxTokens) {
        formData.append('maxTokens', maxTokens.toString());
      }

      try {
        const response = await fetch(STREAM_API_URL, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKeyToken}`
          },
          body: formData,
          signal: abortController.signal,
        });

        if (!response.ok) {
          const text = await response.text();
          throw new Error(`HTTP ${response.status}: ${text}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullSummary = '';
        let chunkCount = 0;

        setProgress(30);
        setStatus('Conectado, recibiendo eventos...');

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });

          const lines = buffer.split('\n');
          buffer = lines.pop();

          let currentEvent = null;
          let currentData = null;

          for (const line of lines) {
            if (line.startsWith('event: ')) {
              currentEvent = line.slice(7).trim();
            } else if (line.startsWith('data: ')) {
              currentData = line.slice(6).trim();
            } else if (line === '' && currentEvent && currentData) {
              try {
                const json = JSON.parse(currentData);
                addLog(currentEvent, json);

                switch (currentEvent) {
                  case 'status':
                    setStatus(`Estado: ${json.status}`);
                    if (json.status === 'extracting_text') setProgress(10);
                    else if (json.status === 'chunking_document') setProgress(30);
                    else if (json.status === 'generating_summary') setProgress(50);
                    else if (json.status === 'reducing_summary') setProgress(80);
                    break;

                  case 'chunk':
                    chunkCount++;
                    fullSummary += json.data;
                    setProgress(Math.min(50 + (chunkCount % 20) * 2, 95));
                    break;

                  case 'completed':
                    fullSummary = json.summary;
                    summaryContent.textContent = fullSummary;
                    summaryOutput.classList.add('visible');
                    setProgress(100);
                    setStatus('Completado');
                    btnCancel.disabled = true;
                    addLog('completed', 'Resumen recibido exitosamente');
                    break;

                  case 'error':
                    setStatus('Error: ' + json.error);
                    addLog(currentEvent, json);
                    btnCancel.disabled = true;
                    break;
                }
              } catch (e) {
                addLog('parse-error', currentData);
              }

              currentEvent = null;
              currentData = null;
            }
          }
        }
      } catch (err) {
        if (err.name === 'AbortError') {
          addLog('abort', 'Solicitud cancelada por el usuario');
        } else {
          setStatus('Error: ' + err.message);
          addLog('error', { error: err.message });
        }
      } finally {
        btnSend.disabled = false;
        btnCancel.disabled = true;
        abortController = null;
      }
    });

    // ── API Key event listeners ──

    btnSaveApiKey.addEventListener('click', saveApiKey);

    apiKeyInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') saveApiKey();
    });

    btnClearApiKey.addEventListener('click', clearApiKey);

    btnGenerateApiKey.addEventListener('click', () => {
      genKeySection.style.display = genKeySection.style.display === 'none' ? 'block' : 'none';
    });

    // ── Init ──

    updateModels();
    updateUI();
  </script>
</body>

</html>
