<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resumen por Streaming</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      padding: 2rem;
      min-height: 100vh;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: .5rem;
    }

    p {
      color: #666;
      margin-bottom: 1.5rem;
      font-size: .9rem;
    }

    .section {
      margin-top: 1rem;
      background: #fff;
      padding: 1rem;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .1);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .section-header h3 {
      font-size: 1rem;
      font-weight: 600;
      color: #333;
    }

    .section-body {
      margin-top: 1rem;
    }

    .section-body.hidden {
      display: none;
    }

    .drop-zone {
      border: 2px dashed #ccc;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      text-align: center;
      transition: all .2s;
      cursor: pointer;
      background: #fff;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .drop-zone.has-file {
      border-color: #16a34a;
      border-style: solid;
      background: #f0fdf4;
    }

    .drop-zone input {
      display: none;
    }

    .drop-zone .icon {
      font-size: 2rem;
      margin-bottom: .5rem;
    }

    .drop-zone .file-name {
      font-weight: 600;
    }

    button {
      display: block;
      width: 100%;
      margin-top: 1rem;
      padding: .75rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }

    button:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: #1d4ed8;
    }

    .btn-danger {
      background: #dc2626;
      color: #fff;
    }

    .btn-danger:hover:not(:disabled) {
      background: #b91c1c;
    }

    .btn-success {
      background: #16a34a;
      color: #fff;
    }

    .btn-success:hover:not(:disabled) {
      background: #15803d;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #d1d5db;
      color: #374151;
    }

    .btn-outline:hover:not(:disabled) {
      background: #f3f4f6;
    }

    .btn-sm {
      display: inline-block;
      width: auto;
      padding: .4rem .75rem;
      font-size: .8rem;
      margin-top: 0;
      border-radius: 6px;
    }

    .btn-sm.active {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }

    .actions {
      display: flex;
      gap: .5rem;
    }

    .actions button {
      flex: 1;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-size: .875rem;
      font-weight: 600;
      margin-bottom: .25rem;
      color: #333;
    }

    .form-group select,
    .form-group input,
    .form-group textarea {
      padding: .5rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: .9rem;
      background: #fff;
      transition: border-color .2s;
    }

    .form-group select:focus,
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .form-group input[type="range"] {
      padding: 0;
      border: none;
      margin-top: .25rem;
    }

    .form-group input[type="number"] {
      width: 100%;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .25rem .6rem;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
    }

    .badge-tenant {
      background: #dbeafe;
      color: #1e40af;
    }

    .progress-bar {
      margin-top: 1rem;
      height: 4px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
      display: none;
    }

    .progress-bar.active {
      display: block;
    }

    .progress-bar .fill {
      height: 100%;
      width: 0%;
      background: #2563eb;
      transition: width .3s;
    }

    .status {
      margin-top: .75rem;
      font-size: .875rem;
      color: #666;
    }

    .log {
      margin-top: 1rem;
      background: #1a1a2e;
      color: #e0e0e0;
      border-radius: 8px;
      padding: 1rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: .8rem;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
    }

    .log.active {
      display: block;
    }

    .log .event {
      margin-bottom: .25rem;
    }

    .log .event.status {
      color: #fbbf24;
    }

    .log .event.chunk {
      color: #a78bfa;
    }

    .log .event.completed {
      color: #34d399;
    }

    .log .event.error {
      color: #f87171;
    }

    .log .event.info {
      color: #60a5fa;
    }

    #summary-output {
      margin-top: 1rem;
      background: #fff;
      border-radius: 8px;
      padding: 1.25rem;
      line-height: 1.6;
      display: none;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .1);
    }

    #summary-output.visible {
      display: block;
    }

    #summary-output h2 {
      font-size: 1rem;
      margin-bottom: .5rem;
      color: #333;
    }

    #summary-output .content {
      font-size: .9rem;
      color: #444;
    }

    .result-msg {
      margin-top: .75rem;
      padding: .5rem .75rem;
      border-radius: 6px;
      font-size: .85rem;
      display: none;
    }

    .result-msg.success {
      display: block;
      background: #dcfce7;
      color: #166534;
    }

    .result-msg.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }

    .tenant-info-bar {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .5rem .75rem;
      background: #f0f9ff;
      border-radius: 6px;
      margin-bottom: .75rem;
      font-size: .85rem;
      color: #1e40af;
      flex-wrap: wrap;
    }

    .tenant-info-bar .label {
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Resumen por Streaming</h1>
    <p>Subí un PDF o TXT y recibí el resumen en tiempo real via SSE.</p>

    <!-- API Key Section -->
    <div class="section">
      <div class="section-header">
        <h3>🔑 API Key</h3>
        <button class="btn-sm btn-outline" id="btnClearApiKey" style="display:none">🗑 Limpiar</button>
      </div>
      <div class="form-group">
        <input type="text" id="apiKeyInput" placeholder="smm_e04ec294..." value="smm_e04ec29491bbafab1f9b79ed7a9474925da34e084d327296cf8cbb2977bf3a84">
      </div>
      <div id="quickKeys" style="display:flex;gap:.5rem;margin-top:.5rem;flex-wrap:wrap"></div>
      <div style="display:flex;gap:.5rem;margin-top:.5rem">
        <button class="btn-primary btn-sm" id="btnSaveApiKey" style="width:auto">Guardar</button>
        <button class="btn-outline btn-sm" id="btnRegisterToggle" style="width:auto;display:none">📋 Registrar Cliente</button>
      </div>
      <div class="badge-group" id="keyBadges" style="display:none;margin-top:.5rem">
        <span class="badge badge-tenant" id="tenantBadge">Tenant: —</span>
      </div>
    </div>

    <!-- Register Client Section -->
    <div class="section" id="registerSection" style="display:none">
      <div class="section-header">
        <h3>📋 Registrar Nuevo Cliente</h3>
      </div>
      <div class="section-body">
        <div class="form-group" style="margin-bottom:.75rem">
          <label for="regCompanyName">Nombre de empresa</label>
          <input type="text" id="regCompanyName" placeholder="Mi Empresa S.A.">
        </div>
        <div class="form-row" style="margin-bottom:.75rem">
          <div class="form-group">
            <label for="regEmail">Email</label>
            <input type="text" id="regEmail" placeholder="admin@empresa.com">
          </div>
          <div class="form-group">
            <label for="regContactName">Contacto</label>
            <input type="text" id="regContactName" placeholder="Juan Pérez">
          </div>
        </div>
        <div class="form-group" style="margin-bottom:.75rem">
          <label for="regDomain">Dominio (URL completa, ej: http://localhost:5500)</label>
          <input type="text" id="regDomain" placeholder="http://localhost:5500" value="http://localhost:5500">
        </div>
        <button class="btn-success" id="btnRegisterClient">Registrar y Generar API Key</button>
        <div class="result-msg" id="regResult"></div>
      </div>
    </div>

    <!-- Summarizer Section -->
    <div class="section">
      <div class="tenant-info-bar" id="tenantInfoBar">
        <span class="label">Tenant activo:</span>
        <span id="activeTenantDisplay" style="font-weight:600">—</span>
      </div>

      <div class="drop-zone" id="dropZone">
        <div class="icon">&#128196;</div>
        <div>Arrastrá un archivo o hacé clic para seleccionar</div>
        <div class="file-name" id="fileName"></div>
        <input type="file" id="fileInput" accept=".pdf,.txt,application/pdf,text/plain">
      </div>

      <div class="form-row" style="margin-top:1rem">
        <div class="form-group">
          <label for="providerSelect">Provider:</label>
          <select id="providerSelect">
            <option value="groq">Groq</option>
            <option value="gemini">Gemini</option>
          </select>
        </div>
        <div class="form-group">
          <label for="modelSelect">Modelo:</label>
          <select id="modelSelect">
            <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
          </select>
        </div>
      </div>

      <div class="form-row" style="margin-top:.75rem">
        <div class="form-group">
          <label for="temperatureRange">Temperatura: <span id="temperatureValue">0.2</span></label>
          <input type="range" id="temperatureRange" min="0" max="2" step="0.1" value="0.2">
        </div>
        <div class="form-group">
          <label for="maxTokensInput">Max Tokens:</label>
          <input type="number" id="maxTokensInput" min="64" max="8192" step="64" placeholder="2048">
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="btnSend" disabled>Enviar</button>
        <button class="btn-danger" id="btnCancel" disabled>Cancelar</button>
      </div>

      <div class="progress-bar" id="progressBar">
        <div class="fill" id="progressFill"></div>
      </div>
      <div class="status" id="status"></div>

      <div class="log" id="log"></div>

      <div id="summary-output">
        <h2>Resumen</h2>
        <div class="content" id="summaryContent"></div>
      </div>
    </div>
  </div>

  <script>
    const ADMIN_API_KEY = 'smm_e04ec29491bbafab1f9b79ed7a9474925da34e084d327296cf8cbb2977bf3a84';
    const BASE_API_URL = 'http://localhost:5171/api/v1';
    const STREAM_API_URL = BASE_API_URL + '/summaries/stream';
    const REGISTER_API_URL = BASE_API_URL + '/admin/apikeys';
    const REGENERATE_API_URL = BASE_API_URL + '/admin/apikeys/regenerate';

    // Configuración de providers y modelos
    const PROVIDERS_CONFIG = {
      groq: {
        label: 'Groq',
        models: [
          { value: 'llama-3.3-70b-versatile', label: 'Llama 3.3 70B (Recomendado)' },
          { value: 'openai/gpt-oss-120b', label: 'GPT-OSS 120B' },
          { value: 'llama-3.1-8b-instant', label: 'Llama 3.1 8B Instant' }
        ]
      },
      gemini: {
        label: 'Gemini',
        models: [
          { value: 'gemini-2.5-flash', label: 'Gemini 2.5 Flash' },
          { value: 'gemini-2.5-pro', label: 'Gemini 2.5 Pro' },
          { value: 'gemini-3-flash-preview', label: 'Gemini 3 Flash (Preview)' },
          { value: 'gemini-1.5-flash-latest', label: 'Gemini 1.5 Flash' },
          { value: 'gemini-1.5-pro-latest', label: 'Gemini 1.5 Pro' }
        ]
      }
    };

    // DOM refs
    const apiKeyInput = document.getElementById('apiKeyInput');
    const btnSaveApiKey = document.getElementById('btnSaveApiKey');
    const btnClearApiKey = document.getElementById('btnClearApiKey');
    const btnRegisterToggle = document.getElementById('btnRegisterToggle');
    const quickKeys = document.getElementById('quickKeys');
    const keyBadges = document.getElementById('keyBadges');
    const tenantBadge = document.getElementById('tenantBadge');
    const activeTenantDisplay = document.getElementById('activeTenantDisplay');

    const registerSection = document.getElementById('registerSection');
    const regCompanyName = document.getElementById('regCompanyName');
    const regEmail = document.getElementById('regEmail');
    const regContactName = document.getElementById('regContactName');
    const regDomain = document.getElementById('regDomain');
    const btnRegisterClient = document.getElementById('btnRegisterClient');
    const regResult = document.getElementById('regResult');

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const btnSend = document.getElementById('btnSend');
    const btnCancel = document.getElementById('btnCancel');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const summaryOutput = document.getElementById('summary-output');
    const summaryContent = document.getElementById('summaryContent');
    const providerSelect = document.getElementById('providerSelect');
    const modelSelect = document.getElementById('modelSelect');
    const temperatureRange = document.getElementById('temperatureRange');
    const temperatureValue = document.getElementById('temperatureValue');
    const maxTokensInput = document.getElementById('maxTokensInput');

    let selectedFile = null;
    let abortController = null;
    let activeKey = null;

    // ── LocalStorage helpers ──

    function getStoredKeys() {
      try {
        return JSON.parse(localStorage.getItem('apiKeys') || '{}');
      } catch {
        return {};
      }
    }

    function setStoredKeys(keys) {
      localStorage.setItem('apiKeys', JSON.stringify(keys));
    }

    function getActiveKey() {
      return localStorage.getItem('activeKey') || null;
    }

    function setActiveKey(key) {
      localStorage.setItem('activeKey', key || '');
    }

    function addStoredKey(label, key) {
      const keys = getStoredKeys();
      keys[label] = key;
      setStoredKeys(keys);
    }

    // ── UI updates ──

    function updateUI() {
      const stored = getStoredKeys();
      const savedActive = getActiveKey();
      activeKey = savedActive || ADMIN_API_KEY;

      // Ensure admin key is always stored
      if (!stored['admin']) {
        stored['admin'] = ADMIN_API_KEY;
        setStoredKeys(stored);
      }

      apiKeyInput.value = activeKey;

      // Rebuild quick-select buttons
      quickKeys.innerHTML = '';
      Object.entries(stored).forEach(([label, key]) => {
        const btn = document.createElement('button');
        btn.className = 'btn-sm btn-outline';
        if (key === activeKey) btn.classList.add('active');
        btn.textContent = label;
        btn.title = key;
        btn.addEventListener('click', () => {
          activeKey = key;
          setActiveKey(key);
          apiKeyInput.value = key;
          updateUI();
          addLog('info', `API Key cambiada a: ${label}`);
        });
        quickKeys.appendChild(btn);
      });

      // Show clear button if key is set
      btnClearApiKey.style.display = activeKey ? 'inline-block' : 'none';

      // Show register toggle only if admin key is active
      const isAdmin = activeKey === ADMIN_API_KEY;
      btnRegisterToggle.style.display = isAdmin ? 'inline-block' : 'none';

      // Badge
      const prefix = activeKey ? activeKey.substring(0, 14) + '...' : '—';
      tenantBadge.textContent = `Key: ${prefix}`;
      keyBadges.style.display = activeKey ? 'flex' : 'none';

      // Tenant display
      const label = Object.entries(stored).find(([, k]) => k === activeKey)?.[0];
      activeTenantDisplay.textContent = label || 'Autenticado';

      btnSend.disabled = !selectedFile || !activeKey;
    }

    function saveApiKey() {
      const token = apiKeyInput.value.trim();
      if (!token) return;

      const label = prompt('Nombre para esta API Key (ej: admin, tenant_1):', 'custom');
      if (!label) return;

      addStoredKey(label, token);
      activeKey = token;
      setActiveKey(token);
      addLog('info', `API Key guardada como "${label}"`);
      updateUI();
    }

    function clearApiKey() {
      const stored = getStoredKeys();
      const label = Object.entries(stored).find(([, k]) => k === activeKey)?.[0];
      if (label && label !== 'admin') {
        delete stored[label];
        setStoredKeys(stored);
        addLog('info', `API Key "${label}" eliminada`);
      }
      activeKey = ADMIN_API_KEY;
      setActiveKey(ADMIN_API_KEY);
      apiKeyInput.value = ADMIN_API_KEY;
      updateUI();
    }

    // ── Register Toggle ──

    btnRegisterToggle.addEventListener('click', () => {
      const shown = registerSection.style.display !== 'none';
      registerSection.style.display = shown ? 'none' : 'block';
    });

    // ── Register Client ──

    btnRegisterClient.addEventListener('click', async () => {
      const companyName = regCompanyName.value.trim();
      const domain = regDomain.value.trim();

      if (!companyName) {
        regResult.className = 'result-msg error';
        regResult.textContent = 'Completá el nombre de la empresa';
        regResult.style.display = 'block';
        return;
      }

      if (!domain) {
        regResult.className = 'result-msg error';
        regResult.textContent = 'Completá el dominio del cliente (URL completa)';
        regResult.style.display = 'block';
        return;
      }

      btnRegisterClient.disabled = true;
      btnRegisterClient.textContent = 'Registrando...';

      try {
        const res = await fetch(REGISTER_API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${activeKey}`
          },
          body: JSON.stringify({
            companyName,
            email: regEmail.value.trim() || null,
            contactName: regContactName.value.trim() || null,
            domain
          })
        });

        if (!res.ok) {
          const text = await res.text();
          throw new Error(`HTTP ${res.status}: ${text}`);
        }

        const data = await res.json();
        regResult.className = 'result-msg success';
        regResult.textContent = `✓ Cliente "${data.companyName}" registrado. Tenant: ${data.tenantId}`;
        regResult.style.display = 'block';

        // Add new key to stored keys
        addStoredKey(data.tenantId, data.apiKey);
        addLog('info', `Nuevo cliente registrado: ${data.tenantId}`);
        updateUI();

        // Show generated key in a copy-friendly way
        const keyNotice = document.createElement('div');
        keyNotice.style.cssText = 'margin-top:.5rem;padding:.5rem;background:#f0fdf4;border-radius:6px;font-size:.8rem;word-break:break-all';
        keyNotice.innerHTML = `<strong>API Key generada (una sola vez):</strong><br><code style="font-size:.75rem">${data.apiKey}</code>`;
        regResult.appendChild(keyNotice);

        regCompanyName.value = '';
        regEmail.value = '';
        regContactName.value = '';
        regDomain.value = '';
      } catch (err) {
        regResult.className = 'result-msg error';
        regResult.textContent = `Error: ${err.message}`;
        regResult.style.display = 'block';
      } finally {
        btnRegisterClient.disabled = false;
        btnRegisterClient.textContent = 'Registrar y Generar API Key';
      }
    });

    // ── Summarizer ──

    function updateModels() {
      const provider = providerSelect.value;
      const config = PROVIDERS_CONFIG[provider];
      modelSelect.innerHTML = '';
      config.models.forEach(model => {
        const option = document.createElement('option');
        option.value = model.value;
        option.textContent = model.label;
        modelSelect.appendChild(option);
      });
    }

    providerSelect.addEventListener('change', updateModels);

    temperatureRange.addEventListener('input', () => {
      temperatureValue.textContent = parseFloat(temperatureRange.value).toFixed(1);
    });

    function updateSendButton() {
      const hasFile = selectedFile !== null;
      dropZone.classList.toggle('has-file', hasFile);
      fileName.textContent = hasFile ? selectedFile.name : '';
      btnSend.disabled = !hasFile || !activeKey;
    }

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) setFile(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    function setFile(file) {
      selectedFile = file;
      updateSendButton();
    }

    function addLog(event, data) {
      logEl.classList.add('active');
      const line = document.createElement('div');
      line.className = `event ${event}`;
      line.textContent = `[${event}] ${typeof data === 'string' ? data : JSON.stringify(data)}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function setProgress(pct) {
      progressBar.classList.add('active');
      progressFill.style.width = pct + '%';
    }

    btnCancel.addEventListener('click', () => {
      if (abortController) {
        abortController.abort();
        abortController = null;
      }
      setStatus('Cancelado');
      btnCancel.disabled = true;
    });

    btnSend.addEventListener('click', async () => {
      if (!selectedFile || !activeKey) return;

      summaryOutput.classList.remove('visible');
      summaryContent.textContent = '';
      logEl.classList.remove('active');
      logEl.innerHTML = '';
      progressFill.style.width = '0%';
      btnSend.disabled = true;
      btnCancel.disabled = false;

      const temperature = parseFloat(temperatureRange.value);
      const maxTokens = maxTokensInput.value
        ? parseInt(maxTokensInput.value, 10)
        : '';

      addLog('info', `Provider: ${providerSelect.options[providerSelect.selectedIndex].text}, Modelo: ${modelSelect.options[modelSelect.selectedIndex].text}${maxTokens ? `, MaxTokens: ${maxTokens}` : ''}`);

      abortController = new AbortController();

      const formData = new FormData();
      formData.append('document', selectedFile);
      formData.append('provider', providerSelect.value);
      formData.append('model', modelSelect.value);
      formData.append('temperature', temperature.toString());
      if (maxTokens) {
        formData.append('maxTokens', maxTokens.toString());
      }

      try {
        const response = await fetch(STREAM_API_URL, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${activeKey}`
          },
          body: formData,
          signal: abortController.signal,
        });

        if (!response.ok) {
          const text = await response.text();
          throw new Error(`HTTP ${response.status}: ${text}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullSummary = '';
        let chunkCount = 0;

        setProgress(30);
        setStatus('Conectado, recibiendo eventos...');

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });

          const lines = buffer.split('\n');
          buffer = lines.pop();

          let currentEvent = null;
          let currentData = null;

          for (const line of lines) {
            if (line.startsWith('event: ')) {
              currentEvent = line.slice(7).trim();
            } else if (line.startsWith('data: ')) {
              currentData = line.slice(6).trim();
            } else if (line === '' && currentEvent && currentData) {
              try {
                const json = JSON.parse(currentData);
                addLog(currentEvent, json);

                switch (currentEvent) {
                  case 'status':
                    setStatus(`Estado: ${json.status}`);
                    if (json.status === 'extracting_text') setProgress(10);
                    else if (json.status === 'chunking_document') setProgress(30);
                    else if (json.status === 'generating_summary') setProgress(50);
                    else if (json.status === 'reducing_summary') setProgress(80);
                    break;

                  case 'chunk':
                    chunkCount++;
                    fullSummary += json.data;
                    setProgress(Math.min(50 + (chunkCount % 20) * 2, 95));
                    break;

                  case 'completed':
                    fullSummary = json.summary;
                    summaryContent.textContent = fullSummary;
                    summaryOutput.classList.add('visible');
                    setProgress(100);
                    setStatus('Completado');
                    btnCancel.disabled = true;
                    addLog('completed', 'Resumen recibido exitosamente');
                    break;

                  case 'error':
                    setStatus('Error: ' + json.error);
                    addLog(currentEvent, json);
                    btnCancel.disabled = true;
                    break;
                }
              } catch (e) {
                addLog('parse-error', currentData);
              }

              currentEvent = null;
              currentData = null;
            }
          }
        }
      } catch (err) {
        if (err.name === 'AbortError') {
          addLog('abort', 'Solicitud cancelada por el usuario');
        } else {
          setStatus('Error: ' + err.message);
          addLog('error', { error: err.message });
        }
      } finally {
        btnSend.disabled = false;
        btnCancel.disabled = true;
        abortController = null;
      }
    });

    // ── API Key event listeners ──

    btnSaveApiKey.addEventListener('click', saveApiKey);

    apiKeyInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') saveApiKey();
    });

    btnClearApiKey.addEventListener('click', clearApiKey);

    // ── Init ──

    updateModels();
    updateUI();
  </script>
</body>

</html>
